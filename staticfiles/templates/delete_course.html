<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Course</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            padding: 40px;
        }

        .container {
            max-width: 500px;
            background: #fff;
            padding: 20px;
            margin: auto;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            margin-bottom: 20px;
        }

        .warning {
            color: #e74c3c;
            font-weight: bold;
            margin-bottom: 20px;
        }

        button {
            width: 45%;
            padding: 12px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        .delete-btn {
            background: #e74c3c;
            color: #fff;
        }

        .delete-btn:hover {
            background: #c0392b;
        }

        .cancel-btn {
            background: #7f8c8d;
            color: #fff;
        }

        .cancel-btn:hover {
            background: #636e72;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Delete Course</h2>

        <p class="warning">Are you sure you want to delete this course?</p>
        <p><strong>{{ course.course_name }}</strong></p>

        <form method="POST">
            {% csrf_token %}
            <button type="submit" class="delete-btn">Delete</button>
            <a href="{% url 'manage_course' %}">
                <button type="button" class="cancel-btn">Cancel</button>
            </a>
        </form>
    </div>

</body>
</html>
