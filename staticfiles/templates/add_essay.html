<!DOCTYPE html>
<html>
<head>
    <title>Add Essay Question</title>
    <style>
        body {
            font-family: Arial;
            background: #f2f4f8;
            padding: 30px;
        }

        .card {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        h2 {
            color: #0066ff;
        }

        textarea, input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            background: #0066ff;
            color: white;
            padding: 10px;
            border: none;
            width: 100%;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #004dcc;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Add Essay Question</h2>

    <form method="POST">
        {% csrf_token %}

        <label>Question</label>
        <textarea name="question" required></textarea>

        <label>Marks</label>
        <input type="number" name="marks" value="10" required>

        <button type="submit">Save Question</button>
    </form>
</div>

</body>
</html>
