
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificates</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f2f4f8;
        margin: 0;
    }

    .dashboard-container {
        display: flex;
        min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
        width: 220px;
        background-color: #0066ff;
        color: white;
        padding: 20px;
    }

    .sidebar .logo {
        font-size: 18px;
        font-weight: bold;
        margin-bottom: 30px;
    }

    .sidebar ul {
        list-style: none;
        padding: 0;
    }

    .sidebar ul li {
        margin-bottom: 15px;
        padding: 10px;
        border-radius: 6px;
    }

    .sidebar ul li:hover,
    .sidebar ul li.active {
        background-color: #004dcc;
    }

    .sidebar ul li a {
        text-decoration: none;
        color: white;
        display: block;
    }

    /* Main content */
    .main-content {
        flex: 1;
        padding: 30px;
        background-color: #f2f4f8;
    }

    h1 {
        color: #333;
        margin-bottom: 25px;
    }

    /* Certificate Card Grid */
    .grid-container {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 20px;
    }

    .card {
        background: white;
        padding: 20px;
        border-radius: 8px;
        text-align: center;
        box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }

    .card h3 {
        color: #0066ff;
        margin-bottom: 15px;
    }

    .download-btn {
        background: #0066ff;
        color: white;
        padding: 10px 15px;
        border-radius: 6px;
        text-decoration: none;
        display: inline-block;
    }

    .download-btn:hover {
        background: #004dcc;
    }

    /* Empty State */
    .empty-msg {
        font-size: 18px;
        color: #666;
        margin-top: 20px;
        text-align: center;
    }
</style>
</head>
<body>

<div class="dashboard-container">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="logo">Academic Data Identity System</div>
        <ul>
            <li><a href="{% url 'dashboard' %}">Dashboard</a></li>
            <li class="active"><a href="{% url 'certificate' %}">Certificates</a></li>
            <li><a href="{% url 'department' %}">Departments</a></li>
        </ul>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <h1>My Certificates</h1>

        {% if certificates %}
        <div class="grid-container">
            {% for cert in certificates %}
            <div class="card">
                <h3>{{ cert.title }}</h3>

                <a href="{{ cert.file.url }}" download class="download-btn">
                    Download PDF
                </a>
            </div>
            {% endfor %}
        </div>
        {% else %}
        <p class="empty-msg">No certificates available yet.</p>
        {% endif %}
    </main>
</div>

</body>
</html>
