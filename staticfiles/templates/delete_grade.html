<h2>Are you sure you want to delete this grade?</h2>

<p>{{ grade.student.full_name }} - {{ grade.course.name }} : {{ grade.grade }}</p>

<form method="POST">
    {% csrf_token %}
    <button type="submit" style="background:red; color:white;">Yes Delete</button>
    <a href="{% url 'manage_grades' %}">Cancel</a>
</form>
