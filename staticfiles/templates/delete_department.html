<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Delete Department</title>
{% load static %}
<link rel="stylesheet" href="{% static 'style.css' %}">
</head>

<body>

<div class="dashboard-container">

    <aside class="sidebar">
        <div class="logo">Admin Dashboard</div>
        <ul>
            <li><a href="{% url 'manage_departments' %}">Back to Departments</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <h1>Delete Department</h1>

        <div class="card">
            <h3>Are you sure you want to delete this department?</h3>

            <p><strong>{{ dept.name }}</strong></p>
            <p>Head: {{ dept.head }}</p>
            <p>Contact: {{ dept.contact }}</p>

            <form method="POST">
                {% csrf_token %}
                <button type="submit" style="background:red;">Yes, Delete</button>
                <a href="{% url 'manage_departments' %}">
                    <button type="button">Cancel</button>
                </a>
            </form>

        </div>
    </main>

</div>

</body>
</html>
