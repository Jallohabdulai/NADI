<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Course</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            padding: 40px;
        }

        .container {
            max-width: 500px;
            background: #fff;
            padding: 25px;
            margin: auto;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
            display: block;
            margin: 10px 0 5px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #2980b9;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Edit Course</h2>

        <form method="POST">
            {% csrf_token %}

            <label>Course Name</label>
            <input type="text" name="course_name" value="{{ course.course_name }}" required>

            <label>Course Code</label>
            <input type="text" name="course_code" value="{{ course.course_code }}" required>

            <label>Credit Hours</label>
            <input type="number" name="credit_hours" value="{{ course.credit_hours }}" required>

            <button type="submit">Update Course</button>
        </form>
    </div>

</body>
</html>
