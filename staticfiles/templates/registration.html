<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration</title>
{% load static %}
    <style>
        body {
            font-family: Arial, sans-serif;
            
            /* 🔥 ADD IMAGE BACKGROUND */
            background: url("{% static 'register.jpg' %}") no-repeat center center/cover;
            display: flex;
            justify-content: center;
            padding: 30px;
        }
        .forgot-password {
            text-align: center;
            margin-top: 10px;
        }

        .forgot-password a {
            text-decoration: none;
            color: #0066ff;
        }

        .form-container {
            width: 420px;
            background: #fff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .form-container h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
        }

        input[type="file"] {
            padding: 5px;
        }

        .gender-group {
            display: flex;
            gap: 20px;
            margin-top: 5px;
        }

        button {
            width: 100%;
            background: #0066ff;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 17px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #004dcc;
        }

        .error {
            color: red;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>User Registration</h2>

        <!-- DISPLAY BACKEND ERRORS -->
        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}

        <form action="{% url 'registration' %}" method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" placeholder="Enter full name" name="fullname" required>
            </div>

            <div class="form-group">
                <label>Student ID</label>
                <input type="text" placeholder="Enter student ID" name="student_id" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="Enter email address" name="email" required>
            </div>

            <div class="form-group">
                <label>Level</label>
                <select required name="level">
                    <option value="">Select level</option>
                    <option>Primary</option>
                    <option>Secondary</option>
                    <option>Tertiary</option>
                </select>
            </div>

            <div class="form-group">
                <label>Department</label>
                <select required name="department">
                    <option value="">Select department</option>
                    <option>Computer Science</option>
                    <option>Information Technology</option>
                    <option>Business Administration</option>
                    <option>Engineering</option>
                    <option>Accounting</option>
                </select>
            </div>

            <div class="form-group">
                <label>Profile Photo</label>
                <input type="file" accept="image/*" name="profile_photo" required>
            </div>

            <div class="form-group">
                <label>Date of Birth</label>
                <input type="date" name="dob" required>
            </div>

            <div class="form-group">
                <label>Gender</label>
                <div class="gender-group">
                    <label><input type="radio" name="gender" value="Male" required> Male</label>
                    <label><input type="radio" name="gender" value="Female" required> Female</label>
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <div class="forgot-password">
                <a href="{% url 'login_user' %}">Login</a>
            </div>

            <button type="submit">Register</button>

        </form>
    </div>

</body>
</html>
