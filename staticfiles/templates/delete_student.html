<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delete Student</title>
<style>

body {
    font-family: Arial, sans-serif;
    background: #f2f4f8;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card container */
.delete-card {
    background: #fff;
    padding: 30px;
    border-radius: 10px;
    text-align: center;
    width: 400px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

/* Heading */
.delete-card h2 {
    margin-bottom: 15px;
    color: #333;
}

/* Message */
.delete-card p {
    margin-bottom: 25px;
    font-size: 16px;
}

/* Buttons container */
.btn-group {
    display: flex;
    justify-content: space-between;
}

/* Delete button */
.delete-btn {
    background: #e74c3c;
    color: white;
    padding: 12px 18px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    width: 48%;
    font-size: 15px;
}

.delete-btn:hover {
    background: #c0392b;
}

/* Cancel button */
.cancel-btn {
    background: #bdc3c7;
    color: black;
    padding: 12px 18px;
    border-radius: 6px;
    text-decoration: none;
    width: 48%;
    display: inline-block;
    text-align: center;
}

.cancel-btn:hover {
    background: #95a5a6;
}

</style>
</head>
<body>

<div class="delete-card">
    <h2>Delete Student</h2>

    <p>Are you sure you want to delete <strong>{{ student.full_name }}</strong>?</p>

    <form method="POST">
        {% csrf_token %}

        <div class="btn-group">
            <button type="submit" class="delete-btn">Yes, Delete</button>

            <a href="{% url 'manage_student' %}" class="cancel-btn">No</a>
        </div>
    </form>
</div>

</body>
</html>
