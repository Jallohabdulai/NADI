<style>
    .card {
    background: white;
    padding: 20px;
    margin: 20px 0;
    border-radius: 10px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}

.course-list {
    list-style: none;
    padding: 0;
}

.course-item {
    padding: 15px;
    border-bottom: 1px solid #ddd;
}

.course-item strong {
    color: #0066ff;
}

.course-item a {
    margin-right: 10px;
    text-decoration: none;
    font-weight: bold;
}

.course-item ul {
    margin-top: 10px;
    padding-left: 20px;
}

.course-item ul li {
    font-size: 14px;
    color: #555;
}

button {
    background: #0066ff;
    color: white;
    padding: 8px 12px;
    border: none;
    border-radius: 5px;
}
</style>
<h2>Add Module for {{ course.name }}</h2>

<form method="POST" class="form-card">
    {% csrf_token %}

    <label>Module Name</label>
    <input type="text" name="name" required>

    <label>Module Code</label>
    <input type="text" name="code" required>

    <button type="submit" class="btn">Add Module</button>
</form>
