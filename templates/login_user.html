<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    {% load static %}
    <style>
        body {
            font-family: Arial, sans-serif;

            /* 🔥 ADD IMAGE BACKGROUND */
            background: url("{% static 'image.jpeg' %}") no-repeat center center/cover;

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;

            /* Optional: Dark overlay for better visibility */
            position: relative;
        }

        .login-container {
            width: 350px;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .login-container h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
        }

        button {
            width: 100%;
            background: #0066ff;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 17px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #004dcc;
        }

        .forgot-password {
            text-align: center;
            margin-top: 10px;
        }

        .forgot-password a {
            text-decoration: none;
            color: #0066ff;
        }

        .error {
            color: red;
            text-align: center;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>Login</h2>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        <form action="{% url 'login_user' %}" method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label>Student ID</label>
                <input type="text" name="username" placeholder="Enter your Student ID" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>

            <button type="submit">Login</button>

            <div class="forgot-password">
                <a href="{% url 'registration' %}">Signup</a>
            </div>
        </form>
    </div>

</body>
</html>
